name: Build Android APK with Buildozer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Build အရှိန်မြှင့်ရန်အတွက် Cache မှတ်ခြင်း
    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    # လိုအပ်သော System Packages များ ထည့်သွင်းခြင်း
    - name: Install System Dependencies for Buildozer
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev autoconf automake \
          libtool pkg-config zlib1g-dev xclip libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
          libsdl2-ttf-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
          zip unzip curl
        python -m pip install --upgrade pip
        pip install buildozer cython kivy

    # စနစ်တစ်ခုလုံး၏ SDK/NDK လမ်းကြောင်းများကို စနစ်တကျ သတ်မှတ်ပြီး Build ခြင်း
    - name: Build APK using GitHub's Android SDK
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      run: |
        # buildozer.spec ဖိုင် မရှိသေးပါက တည်ဆောက်မည်
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        
        # 1. GitHub စက်ထဲတွင် အဆင်သင့်ရှိသော SDK နှင့် NDK လမ်းကြောင်းများကို အတင်းသတ်မှတ်မည်
        sed -i 's|#\s*android.sdk_path =.*|android.sdk_path = /usr/local/lib/android/sdk|g' buildozer.spec
        sed -i 's|^android.sdk_path =.*|android.sdk_path = /usr/local/lib/android/sdk|g' buildozer.spec
        
        # GitHub Runner တွင် လက်ရှိပါဝင်သော NDK 27.3.13750724 လမ်းကြောင်းအား ပတ်လမ်းကြောင်းပေးခြင်း
        sed -i 's|#\s*android.ndk_path =.*|android.ndk_path = /usr/local/lib/android/sdk/ndk/27.3.13750724|g' buildozer.spec
        sed -i 's|^android.ndk_path =.*|android.ndk_path = /usr/local/lib/android/sdk/ndk/27.3.13750724|g' buildozer.spec
        
        # 2. ပါရှိပြီးသား NDK ဗားရှင်းနှင့် အကိုက်ညီဆုံးဖြစ်အောင် API Level ကို ၃၄ သို့ ပြောင်းလဲမည်
        sed -i 's|#\s*android.api =.*|android.api = 34|g' buildozer.spec
        sed -i 's|^android.api =.*|android.api = 34|g' buildozer.spec
        
        # စစ်ဆေးရန်အတွက် ပြင်ဆင်ပြီးသား စာကြောင်းများကို Log တွင် ထုတ်ပြမည်
        echo "=== Verified Config === "
        grep -E '^android.sdk_path|^android.ndk_path|^android.api' buildozer.spec
        echo "========================"
        
        # အလိုအလျောက် လိုင်စင်များ ဖြေဆိုပြီး အမှားကင်းကင်းဖြင့် APK ထုတ်မည်
        yes | buildozer -v android debug

    # ထွက်လာသည့် APK အား စာမျက်နှာပေါ်တွင် Download ဆွဲနိုင်ရန် တင်ပေးခြင်း
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: myanmar-ai-human-brain-apk
        path: bin/*.apk
