<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walone AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex justify-center items-center">
    <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl flex flex-col h-full overflow-hidden">
        <div class="bg-indigo-600 p-5 text-white text-center font-bold text-lg">Walone AI</div>
        
        <div id="chatBox" class="flex-1 p-6 overflow-y-auto space-y-4 bg-gray-50">
            <div class="bg-indigo-100 p-4 rounded-2xl rounded-tl-none max-w-[85%]">မင်္ဂလာပါ! ဘာများ ကူညီပေးရမလဲခင်ဗျာ?</div>
        </div>

        <div class="p-4 border-t">
            <div class="flex gap-2">
                <input type="text" id="userInput" class="flex-1 border rounded-full px-5 py-3 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="မေးခွန်းရိုက်ပါ...">
                <button onclick="sendMessage()" class="bg-indigo-600 text-white px-6 py-3 rounded-full font-bold">Send</button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            let input = document.getElementById("userInput");
            let chatBox = document.getElementById("chatBox");
            if(input.value.trim() === "") return;

            chatBox.innerHTML += `<div class="text-right"><div class="bg-indigo-600 text-white p-4 rounded-2xl rounded-tr-none inline-block max-w-[85%]">${input.value}</div></div>`;
            let msg = input.value;
            input.value = '';

            let res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            let data = await res.json();
            chatBox.innerHTML += `<div class="bg-indigo-100 p-4 rounded-2xl rounded-tl-none max-w-[85%]">${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
