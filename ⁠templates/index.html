<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Walone AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* အဓိကပြင်ရမည့် အချက်များ */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* ဘေးကို ရွေ့လို့မရအောင် ပိတ်မယ် */
            touch-action: manipulation;
        }
        
        /* Container ကို ဖုန်း screen အပြည့်ယူစေမယ် */
        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chatBox { scroll-behavior: smooth; flex-grow: 1; overflow-y: auto; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
