<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walone AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; }
        #chatBox { scroll-behavior: smooth; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 h-screen flex justify-center items-center">

    <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col h-full">
        
        <div class="bg-indigo-600 p-5 text-white text-center font-bold text-lg shadow-md">
            Walone AI Assistant
        </div>

        <div id="chatBox" class="flex-1 p-6 overflow-y-auto space-y-4 bg-gray-50">
            <div class="flex items-start">
                <div class="bg-indigo-100 text-indigo-900 p-4 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm">
                    မင်္ဂလာပါ! ဘာများ ကူညီပေးရမလဲခင်ဗျာ? ပြေစာပုံတင်ပြီးလည်း စစ်ဆေးနိုင်ပါတယ်။
                </div>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-200">
            <div class="flex gap-2 items-center">
                <input type="file" id="imageInput" class="hidden" accept="image/*" onchange="uploadImage()">
                <button onclick="document.getElementById('imageInput').click()" 
                        class="p-3 bg-gray-200 rounded-full hover:bg-gray-300 transition">📷</button>
                
                <input type="text" id="userInput" 
                       class="flex-1 border border-gray-300 rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                       placeholder="မေးခွန်းရိုက်ပါ...">
                
                <button onclick="sendMessage()" 
                        class="bg-indigo-600 text-white px-6 py-3 rounded-full hover:bg-indigo-700 transition font-semibold">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");

        // စာပို့ခြင်း
        async function sendMessage() {
            let input = document.getElementById("userInput");
            if(input.value.trim() === "") return;

            chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-indigo-600 text-white p-4 rounded-2xl rounded-tr-none max-w-[85%]">${input.value}</div></div>`;
            let msg = input.value;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Loading Animation
            chatBox.innerHTML += `<div id="loading" class="p-4 flex items-center gap-2"><div class="loader"></div> AI စဉ်းစားနေသည်...</div>`;
            
            let res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            let data = await res.json();
            document.getElementById("loading").remove();
            
            chatBox.innerHTML += `<div class="flex items-start"><div class="bg-indigo-100 text-indigo-900 p-4 rounded-2xl rounded-tl-none max-w-[85%]">${data.reply}</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ပုံတင်ခြင်း
        async function uploadImage() {
            let file = document.getElementById('imageInput').files[0];
            let reader = new FileReader();
            reader.onloadend = async function() {
                let base64Image = reader.result.split(',')[1];
                chatBox.innerHTML += `<div class="text-right text-sm text-gray-500">📷 ပြေစာပုံတင်ထားသည်...</div>`;
                
                let res = await fetch('/upload', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({image: base64Image})
                });
                let data = await res.json();
                chatBox.innerHTML += `<div class="bg-green-100 p-4 rounded-2xl border-l-4 border-green-500">${data.reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
            reader.readAsDataURL(file);
        }

        // Enter key function
        document.getElementById("userInput").addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
