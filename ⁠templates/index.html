<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walone AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; }
        #chatBox { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex justify-center items-center p-4">

    <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col h-full">
        <div class="bg-indigo-600 p-5 text-white text-center font-bold text-lg shadow-md">
            Walone AI Assistant
        </div>

        <div id="chatBox" class="flex-1 p-6 overflow-y-auto space-y-4 bg-gray-50">
            <div class="flex items-start">
                <div class="bg-indigo-100 text-indigo-900 p-4 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm">
                    မင်္ဂလာပါ! ဘာများ ကူညီပေးရမလဲခင်ဗျာ?
                </div>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-200">
            <div class="flex gap-2">
                <input type="text" id="userInput" 
                       class="flex-1 border border-gray-300 rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                       placeholder="မေးခွန်းရိုက်ပါ...">
                <button onclick="sendMessage()" 
                        class="bg-indigo-600 text-white px-6 py-3 rounded-full hover:bg-indigo-700 transition font-semibold">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            let input = document.getElementById("userInput");
            let chatBox = document.getElementById("chatBox");
            if(input.value.trim() === "") return;

            chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-indigo-600 text-white p-4 rounded-2xl rounded-tr-none max-w-[85%] shadow-md">${input.value}</div></div>`;
            
            let msg = input.value;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            let response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            let data = await response.json();

            chatBox.innerHTML += `<div class="flex items-start"><div class="bg-indigo-100 text-indigo-900 p-4 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm">${data.reply}</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Enter key ကို နှိပ်ရင် ပို့ပေးမယ်
        document.getElementById("userInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { sendMessage(); }
        });
    </script>
</body>
</html>
